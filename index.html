        <section id="visitors" class="block block--visitors">
          <h2 class="section-h">Visitors</h2>
          <figure class="visitor-figure">
            <div class="visitor-map-wrap" id="map-container">
              <script type="text/javascript">
                (function () {
                  const loadMap = () => {
                    const container = document.getElementById('map-container');
                    if (!container) return;

                    // Detect theme
                    const currentTheme = localStorage.getItem("theme") || "aurora";
                    const mapPalette = {
                      light: { ocean: 'f6f8fc', land: 'dfe7f5', marker: '3c5cff', text: '172033' },
                      dark: { ocean: '0b1020', land: '24314b', marker: '8ca6ff', text: 'f2f5fb' },
                      aurora: { ocean: '091426', land: '163a54', marker: '57e6c2', text: 'eaf7ff' }
                    }[currentTheme] || { ocean: '091426', land: '163a54', marker: '57e6c2', text: 'eaf7ff' };

                    const oceanColor = mapPalette.ocean;
                    const landColor = mapPalette.land;
                    const markerColor = mapPalette.marker;
                    const textColor = mapPalette.text;

                    // Calculate parent width dynamically
                    let width = Math.round(container.getBoundingClientRect().width) || 600;
                    // Subtract padding (approx 24px) for beautiful centering without overflow
                    width = width - 24;
                    if (width < 280) width = 280;
                    if (width > 680) width = 680;

                    const script = document.createElement('script');
                    script.type = 'text/javascript';
                    script.id = 'mapmyvisitors';
                    script.src = `https://mapmyvisitors.com/map.js?cl=${landColor}&w=${width}&t=tt&d=UozTdHdb3WU-yTGa9a5rIt-U1u8z_sS9tYrDAXk4HGw&co=${oceanColor}&cmo=${markerColor}&cmn=ff5353&ct=${textColor}`;

                    container.appendChild(script);
                  };

                  if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', loadMap);
                  } else {
                    loadMap();
                  }
                })();
              </script>
            </div>
          </figure>
        </section>
